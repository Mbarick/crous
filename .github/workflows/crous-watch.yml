name: Crous Watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crous-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          SEARCH_URL: ${{ secrets.SEARCH_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python crous_watch.py

      - name: Commit updated state
        run: |
          git config user.name "crous-watch-bot"
          git config user.email "actions@github.com"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "Update seen listings"
          git push
